name: 'Run Greetings API Tests'
description: 'Run greetings API tests against the deployed service'
inputs:
  environment:
    description: 'Environment to run tests against'
    required: true
runs:
  using: composite
  steps:
    - run: echo "Testing greetings service on ${{ inputs.environment }} environment has started.."
      shell: cmd
    - uses: actions/checkout@v6
      with:
        repository: 'mtararujs/course-js-api-framework'
        clean: 'false'
        path: 'course-js-api-framework'
    - name: Install dependencies
      working-directory: ./course-js-api-framework
      run: npm install
      shell: cmd
    - name: Run tests
      working-directory: ./course-js-api-framework
      run: npm run greetings greetings_${{ inputs.environment }}
      shell: cmd
    - run: echo "Testing greetings service on ${{ inputs.environment }} environment finished.."
      shell: cmd
