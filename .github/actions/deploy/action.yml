name: 'Deploy Python Greetings Service'
description: 'Deploy python-greetings service via pm2'
inputs:
  environment:
    description: 'Environment where to deploy the service'
    required: true
  port:
    required: true
runs:
  using: composite
  steps:
    - run: echo "Deployment to ${{ inputs.environment }} environment has started.."
      shell: bash
    - uses: actions/checkout@v6
      with:
        repository: 'mtararujs/python-greetings'
        clean: 'false'
        path: 'python-greetings'
    - name: Create virtual environment
      working-directory: ./python-greetings
      run: python -m venv venv
      shell: bash
    - name: Install dependencies
      working-directory: ./python-greetings
      run: ./venv/Scripts/python -m pip install -r requirements.txt
      shell: bash
    - name: Stop existing service
      working-directory: ./python-greetings
      run: npx --yes pm2 delete greetings-app-${{ inputs.environment }} || true
      shell: bash
    - name: Start service
      working-directory: ./python-greetings
      run: npx --yes pm2 start app.py --name greetings-app-${{ inputs.environment }} --interpreter ./venv/Scripts/python -- --port ${{ inputs.port }}
      shell: bash
    - run: echo "Deployment to ${{ inputs.environment }} environment finished.."
      shell: bash
